services:
  - type: web
    name: oekaki-earth
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_MODEL
        value: gpt-4.1
      - key: OPENAI_API_KEY
        sync: false